# ─────────────────────────────────────────────────────────────────────────────
#  Reference Section Quality API
#
#  Services:
#    extraction-engine  — field extraction model (internal, not exposed to host)
#    api                — FastAPI service exposed on host port 8000
#
#  Quick start:
#    1. cp .env.example .env          # set EXTRACTOR_IMAGE (and optionally API_PORT)
#    2. docker compose up -d          # starts both services
#    3. curl http://localhost:8000/health
#    4. POST to http://localhost:8000/analyze   (see /docs for schema)
#
#  Interactive API docs (Swagger UI):
#    http://localhost:8000/docs
#
#  Set EXTRACTOR_IMAGE in .env:
#    EXTRACTOR_IMAGE=ghcr.io/06hardik/extraction-engine:1.0
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Field extraction model ─────────────────────────────────────────────────
  # Internal only — reachable by the api service via Docker bridge network.
  # Not exposed on any host port.
  extraction-engine:
    image: ${EXTRACTOR_IMAGE:?Set EXTRACTOR_IMAGE in .env or environment}
    restart: unless-stopped
    ports :
      # No host port:container port mapping — internal only.
      - "8070:8070"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8070 && echo -e \"GET /api/isalive HTTP/1.0\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q \"true\"' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 90s   # GROBID loads ~12 Wapiti models — allow up to 90s

  # ── Reference Quality API ──────────────────────────────────────────────────
  # FastAPI service. Accepts POST /analyze with a JSON reference list and
  # returns a full quality report. Exposed on host port 8000.
  #
  # Swagger UI (interactive docs):  http://localhost:8000/docs
  # Health check:                   http://localhost:8000/health
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # host_port:container_port
      # Override the host port via API_PORT in .env:  API_PORT=9000
      - "${API_PORT:-8000}:8000"
    environment:
      # Points at the extraction-engine container via Docker's internal DNS.
      - PARSER_URL=http://extraction-engine:8070/api/processCitation
      - PYTHONUTF8=1
    networks:
      - internal
    restart: unless-stopped
    depends_on:
      extraction-engine:
        condition: service_healthy
    healthcheck:
      # Uses Python's built-in urllib — no curl/wget needed in the container.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

# ── Isolated internal network (no host port exposure for extraction engine) ───
networks:
  internal:
    driver: bridge
